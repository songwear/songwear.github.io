          <p><span style="font-family:'微软雅黑 Bold', '微软雅黑';font-weight:700;">说明：</span></p><p><span style="font-family:'微软雅黑';font-weight:400;"><br></span></p><p><span style="font-family:'微软雅黑';font-weight:400;">评价得分：由员工在评价问卷中直接评价得来的分数；</span></p><p><span style="font-family:'微软雅黑';font-weight:400;">计算得分：对评价得分经过二次计算得出来的分数；</span></p><p><span style="font-family:'微软雅黑';font-weight:400;">计算规则中只约束指标和指标之间的运算关系，最终的指标计算得分中的自评（计算结果）、他评（计算结果）以及分角色的计算得分也按照此约束关系进行换算；</span></p><p><span style="font-family:'微软雅黑';font-weight:400;"><br></span></p><p><span style="font-family:'微软雅黑';font-weight:400;">*模块得分以及一级指标得分默认取指标的算术平均值。</span></p>
